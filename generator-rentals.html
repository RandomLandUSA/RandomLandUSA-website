<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Generator Rentals — RandomLand Gear</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:0;padding:24px;background:#f8fafc;color:#172033}
    .wrap{max-width:980px;margin:0 auto;padding:24px;background:white;border-radius:24px;box-shadow:0 12px 30px rgba(15,23,42,0.08)}
    .listings{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:24px;margin-top:24px}
    .listing{padding:24px;border:1px solid #e2e8f0;border-radius:16px;background:#fff}
    .listing img{width:100%;height:220px;object-fit:cover;border-radius:12px;margin-bottom:16px;background:#f8fafc}
    .listing h2{margin:0 0 12px;font-size:1.2rem}
    .listing p{margin:0 0 16px;color:#475569;line-height:1.5}
    .listing .rent-btn{display:inline-block;padding:12px 18px;background:#1f2937;color:white;text-decoration:none;border-radius:999px;font-weight:700}
    @media (max-width: 760px){
      .listings{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="listings">
      <article class="listing">
        <img src="Generator Rentals/3500/3500.png" alt="3,500 generator" />
        <h2>3,500 Generator</h2>
        <p>Reliable power for smaller jobs, backup needs, and light-duty use.</p>
        <a class="rent-btn" href="rent-3500.html">Rent</a>
      </article>
      <article class="listing">
        <img src="Generator Rentals/5000/5000 stock photo.webp" alt="5,000 generator" />
        <h2>5,000 Generator</h2>
        <p>Higher output for larger projects, heavier loads, and longer runtimes.</p>
        <a class="rent-btn" href="rent-5000.html">Rent</a>
      </article>
    </section>
  </div>
</body>
</html>
