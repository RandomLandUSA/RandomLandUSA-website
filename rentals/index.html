<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Generator Rentals | RandomLand USA</title>

    <link rel="stylesheet" href="css/rentals.css">
</head>

<body>

<header class="hero">

    <div class="hero-content">

        <h1>Generator Rentals</h1>

        <p>
            Quiet inverter generators and portable power for camping,
            RVs, job sites, tailgating, and emergency backup.
        </p>

    </div>

</header>

<section class="filters">

    <input
        id="search"
        type="search"
        placeholder="Search generators..."
    >

    <select id="power-filter">

        <option value="">All Sizes</option>

        <option value="3500">
            3500 Watt
        </option>

        <option value="5000">
            5000 Watt
        </option>

    </select>

</section>

<main>

    <div
        id="generator-grid"
        class="generator-grid">

    </div>

</main>

<script type="module" src="js/rentals.js"></script>

</body>
</html>
